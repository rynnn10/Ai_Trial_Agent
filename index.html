<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard AI Lokal & Cloud</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        chatbg: '#0f172a', panelbg: '#1e293b', userbg: '#3b82f6',
                        aibg: '#334155', textmain: '#f8fafc', textmuted: '#94a3b8'
                    }
                }
            }
        }
    </script>

    <style>
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }

        pre {
            background-color: #020617;
            padding: 1rem;
            border-radius: 0.5rem;
            overflow-x: auto;
            margin: 0.5rem 0;
            border: 1px solid #1e293b;
            color: #38bdf8;
            font-size: 0.875rem;
        }

        code {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        }

        .modern-loader {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .orb {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #38bdf8;
            box-shadow: 0 0 10px #38bdf8, 0 0 20px #38bdf8;
            animation: pulse-glow 1.2s infinite alternate ease-in-out;
        }

        @keyframes pulse-glow {
            0% {
                transform: scale(0.8);
                opacity: 0.6;
                box-shadow: 0 0 5px #38bdf8;
            }

            100% {
                transform: scale(1.2);
                opacity: 1;
                box-shadow: 0 0 15px #38bdf8, 0 0 30px #38bdf8;
            }
        }

        .toast-enter {
            animation: slideIn 0.3s forwards;
        }

        .toast-exit {
            animation: slideOut 0.3s forwards;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-100%);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes slideOut {
            from {
                transform: translateY(0);
                opacity: 1;
            }

            to {
                transform: translateY(-100%);
                opacity: 0;
            }
        }

        #drag-overlay {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(5px);
            border: 3px dashed #3b82f6;
            z-index: 100;
        }
    </style>
</head>

<body
    class="bg-slate-950 text-textmain h-[100dvh] flex flex-col items-center justify-center sm:p-4 sm:bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] relative">

    <div id="drag-overlay"
        class="absolute inset-0 m-4 rounded-2xl hidden flex-col items-center justify-center transition-all z-50">
        <i class="ph ph-upload-simple text-6xl text-blue-500 mb-4 animate-bounce pointer-events-none"></i>
        <h2 class="text-2xl font-bold text-blue-400 pointer-events-none">Lepaskan File di Sini</h2>
        <p class="text-slate-400 mt-2 pointer-events-none">Mendukung Gambar, Teks, dan Kode</p>
    </div>

    <div id="toast-container" class="fixed top-5 left-1/2 transform -translate-x-1/2 z-50 flex flex-col gap-2"></div>

    <div id="debug-console"
        class="hidden absolute sm:top-5 sm:right-5 top-16 right-2 w-72 bg-black/90 border border-slate-700 rounded-lg shadow-2xl z-40 flex-col overflow-hidden">
        <div class="bg-slate-900 p-2 border-b border-slate-700 flex justify-between items-center cursor-move">
            <span class="text-xs font-bold text-slate-300 flex items-center gap-1"><i
                    class="ph ph-terminal text-green-400"></i> API Console</span>
            <button onclick="toggleConsole()" class="text-slate-500 hover:text-red-400"><i class="ph ph-x"></i></button>
        </div>
        <div id="console-logs"
            class="p-3 max-h-60 overflow-y-auto text-[10px] font-mono text-green-400 flex flex-col gap-1">
            <div>> System initialized...</div>
        </div>
    </div>

    <div
        class="w-full h-full sm:max-w-4xl sm:h-[90vh] flex flex-col bg-chatbg sm:rounded-2xl sm:shadow-2xl sm:border border-slate-800 overflow-hidden relative">

        <header
            class="bg-slate-900/80 backdrop-blur-md border-b border-slate-800 p-4 flex items-center justify-between shrink-0 z-10">
            <div class="flex items-center gap-3">
                <div class="bg-blue-500/20 p-2 rounded-lg text-blue-400 relative">
                    <i class="ph ph-cpu text-2xl"></i>
                    <span id="vision-indicator"
                        class="hidden absolute -top-1 -right-1 w-3 h-3 bg-purple-500 rounded-full border-2 border-slate-900"></span>
                </div>
                <div class="flex flex-col gap-1">
                    <h1 class="font-semibold text-lg leading-none">AI Agent</h1>
                    <div class="flex flex-col sm:flex-row gap-1 sm:gap-2">
                        <select id="model-selector" onchange="handleModelChange()"
                            class="bg-slate-800 text-xs text-blue-300 border border-slate-700 rounded px-1 py-0.5 outline-none cursor-pointer hover:bg-slate-700 transition">
                            <option value="llama3.2">Llama 3.2 (Ollama Lokal)</option>
                            <option value="llama3.2-vision">Llama 3.2 Vision (Ollama Lokal)</option>
                            <option value="gemini-2.5-flash">Gemini 2.5 Flash (Google API)</option>
                        </select>

                        <input type="hidden" id="api-url" value="http://192.168.1.16:11434">
                        <input type="hidden" id="api-key" value="AIzaSyBjHfz9qvJupKJkMOgyuoEYswecz2hm_nA">
                    </div>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="toggleConsole()"
                    class="text-textmuted hover:text-green-400 transition-colors p-2 rounded-full hover:bg-slate-800"
                    title="Buka Console"><i class="ph ph-terminal-window text-xl"></i></button>
                <button onclick="clearChat()"
                    class="text-textmuted hover:text-red-400 transition-colors p-2 rounded-full hover:bg-slate-800"
                    title="Bersihkan Obrolan"><i class="ph ph-trash text-xl"></i></button>
            </div>
        </header>

        <main id="chat-box" class="flex-1 overflow-y-auto p-4 sm:p-6 flex flex-col gap-6 scroll-smooth">
            <div class="flex w-full justify-start">
                <div class="flex gap-3 max-w-[90%] sm:max-w-[80%]">
                    <div class="w-8 h-8 rounded-full bg-blue-500/20 flex items-center justify-center shrink-0 mt-1"><i
                            class="ph ph-robot text-blue-400"></i></div>
                    <div id="welcome-message"
                        class="bg-aibg text-textmain p-3 sm:p-4 rounded-2xl rounded-tl-sm shadow-sm leading-relaxed transition-all">
                        Sistem aktif! Anda saat ini menggunakan model <b>Llama 3.2 Standar</b>. Silakan tarik (drag &
                        drop) file teks/kode ke sini atau ketik sesuatu.
                    </div>
                </div>
            </div>
        </main>

        <footer class="bg-slate-900/90 backdrop-blur-md border-t border-slate-800 p-3 sm:p-4 shrink-0 z-20">
            <div class="max-w-4xl mx-auto flex flex-col gap-2">
                <div id="file-preview"
                    class="hidden flex items-center gap-2 bg-slate-800 text-sm text-blue-300 w-fit px-3 py-1.5 rounded-full border border-slate-700">
                    <i class="ph ph-file-text"></i>
                    <span id="file-name" class="max-w-[200px] truncate"></span>
                    <button onclick="resetAttachment()" class="ml-2 text-slate-400 hover:text-red-400"><i
                            class="ph ph-x-circle text-lg"></i></button>
                </div>

                <div
                    class="flex items-end gap-2 bg-panelbg rounded-2xl sm:rounded-full p-1.5 border border-slate-700 focus-within:border-blue-500/50 transition-colors relative">
                    <input type="file" id="fileInput" class="hidden"
                        accept=".png, .jpg, .jpeg, .txt, .csv, .md, .json, .html, .js, .ino">
                    <button onclick="document.getElementById('fileInput').click()"
                        class="p-3 text-textmuted hover:text-blue-400 hover:bg-slate-700 rounded-full transition-all shrink-0 mb-0.5"
                        title="Lampirkan File">
                        <i class="ph ph-paperclip text-xl"></i>
                    </button>
                    <textarea id="userInput" rows="1" placeholder="Tanya sesuatu kepada AI..."
                        class="flex-1 bg-transparent border-none outline-none text-textmain resize-none p-3 max-h-32 min-h-[44px]"
                        oninput="this.style.height = ''; this.style.height = Math.min(this.scrollHeight, 128) + 'px'"
                        onkeydown="handleEnter(event)"></textarea>
                    <button onclick="kirimPesan()"
                        class="p-3 bg-blue-600 hover:bg-blue-500 text-white rounded-full transition-all shrink-0 shadow-lg shadow-blue-500/30 mb-0.5">
                        <i class="ph ph-paper-plane-right text-xl"></i>
                    </button>
                </div>
            </div>
        </footer>
    </div>

    <script>
        let attachedImageBase64 = null;
        let attachedDocumentText = "";
        let attachedFileName = "";
        let attachedMimeType = ""; // TAMBAHAN: Menyimpan tipe file untuk Gemini

        const ALLOWED_EXTENSIONS = ['txt', 'csv', 'md', 'json', 'html', 'js', 'ino', 'png', 'jpg', 'jpeg'];

        function toggleConsole() { const c = document.getElementById('debug-console'); c.classList.toggle('hidden'); c.classList.toggle('flex'); }
        function logConsole(msg, err = false) {
            const logs = document.getElementById('console-logs');
            logs.innerHTML += `<div class="${err ? 'text-red-400' : 'text-green-400'}">[${new Date().toLocaleTimeString('id-ID', { hour12: false })}] ${msg}</div>`;
            logs.scrollTop = logs.scrollHeight; console.log(`[Dashboard] ${msg}`);
        }
        function showToast(msg, type = 'error') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `flex items-center gap-2 text-white px-4 py-2 rounded-lg shadow-lg text-sm backdrop-blur-sm toast-enter ${type === 'error' ? 'bg-red-500/90' : 'bg-green-500/90'}`;
            toast.innerHTML = `<i class="ph ${type === 'error' ? 'ph-warning-circle' : 'ph-check-circle'} text-lg"></i><span>${msg}</span>`;
            container.appendChild(toast); logConsole(`Toast: ${msg}`, type === 'error');
            setTimeout(() => { toast.classList.replace('toast-enter', 'toast-exit'); setTimeout(() => toast.remove(), 300); }, 3000);
        }

        /* --- LOGIKA PERUBAHAN TAMPILAN MODEL --- */
        function handleModelChange() {
            const model = document.getElementById('model-selector').value;
            const indicator = document.getElementById('vision-indicator');
            const welcomeMsg = document.getElementById('welcome-message');

            logConsole(`Model diubah ke: ${model}`);

            if (model === 'gemini-2.5-flash') {
                indicator.classList.remove('hidden');
                showToast('Mode Cloud Aktif. Menggunakan Gemini 2.5 Flash.', 'success');
                if (welcomeMsg) welcomeMsg.innerHTML = "Sistem aktif! Anda menggunakan <b>Gemini 2.5 Flash (Cloud)</b>. Silakan tarik dokumen/gambar atau ketik sesuatu.";
            }
            else if (model === 'llama3.2-vision') {
                indicator.classList.remove('hidden');
                showToast('Mode Vision Lokal Aktif. Fitur gambar dihidupkan.', 'success');
                if (welcomeMsg) welcomeMsg.innerHTML = "Sistem aktif! Anda menggunakan model <b>Llama 3.2 Vision</b>. Silakan tarik gambar atau ketik sesuatu.";
            }
            else {
                indicator.classList.add('hidden');
                if (welcomeMsg) welcomeMsg.innerHTML = "Sistem aktif! Anda menggunakan model <b>Llama 3.2 Standar</b>. Hanya mendukung teks dan kode.";
                if (attachedImageBase64) { resetAttachment(); showToast('Lampiran gambar dihapus (tidak didukung model ini).', 'error'); }
            }
        }

        const dropZone = document.body; const dragOverlay = document.getElementById('drag-overlay');
        dropZone.addEventListener('dragover', (e) => e.preventDefault());
        dropZone.addEventListener('dragenter', (e) => { e.preventDefault(); dragOverlay.classList.remove('hidden'); dragOverlay.classList.add('flex'); });
        dragOverlay.addEventListener('dragleave', (e) => { e.preventDefault(); dragOverlay.classList.add('hidden'); dragOverlay.classList.remove('flex'); });
        dragOverlay.addEventListener('drop', (e) => { e.preventDefault(); dragOverlay.classList.add('hidden'); dragOverlay.classList.remove('flex'); if (e.dataTransfer.files.length > 0) handleFileUpload(e.dataTransfer.files[0]); });
        document.getElementById("fileInput").addEventListener("change", (e) => { if (e.target.files.length > 0) handleFileUpload(e.target.files[0]); });

        function handleFileUpload(file) {
            logConsole(`Menganalisis file: ${file.name}`);
            const ext = file.name.split('.').pop().toLowerCase();
            const model = document.getElementById('model-selector').value;

            if (!ALLOWED_EXTENSIONS.includes(ext)) { showToast(`Format .${ext} tidak didukung.`); return; }
            const isImage = file.type.startsWith("image/");
            if (isImage && model === 'llama3.2') { showToast('Ubah model ke Vision/Gemini terlebih dahulu untuk upload gambar!'); return; }

            attachedFileName = file.name;
            attachedMimeType = file.type; // Simpan tipe file untuk Gemini API

            document.getElementById("file-preview").style.display = "flex";
            document.getElementById("file-name").innerText = file.name;
            document.getElementById("file-preview").querySelector('i').className = isImage ? 'ph ph-image' : 'ph ph-file-text';

            const reader = new FileReader();
            if (isImage) {
                reader.onload = (e) => { attachedImageBase64 = e.target.result.split(",")[1]; attachedDocumentText = ""; logConsole(`Gambar di-decode.`); };
                reader.readAsDataURL(file);
            } else {
                reader.onload = (e) => { attachedDocumentText = e.target.result; attachedImageBase64 = null; logConsole(`Dokumen dibaca.`); };
                reader.readAsText(file);
            }
        }

        function formatMarkdown(text) {
            text = text.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
            text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            text = text.replace(/\*(.*?)\*/g, '<em>$1</em>');
            text = text.replace(/\n/g, '<br>');
            return text;
        }


        /* --- LOGIKA PENGIRIMAN MULTI-API (OLLAMA & GEMINI) --- */
        async function kirimPesan() {
            const inputField = document.getElementById("userInput");
            const chatBox = document.getElementById("chat-box");
            let pesan = inputField.value.trim();

            if (!pesan && !attachedImageBase64 && !attachedDocumentText) return;

            // Ambil waktu saat ini
            const timeNow = new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });

            let userHtml = pesan.replace(/\n/g, '<br>');
            if (attachedImageBase64) userHtml += `<div class="mt-3"><img src="data:image/png;base64,${attachedImageBase64}" class="max-w-[200px] w-full rounded-lg border border-blue-400/30 object-cover"></div>`;
            else if (attachedDocumentText) userHtml += `<div class="mt-3 flex items-center gap-2 bg-blue-700/50 p-2 rounded text-sm"><i class="ph ph-file-text"></i> ${attachedFileName}</div>`;

            // Simpan teks mentah ke atribut agar aman saat diedit dan buat ID Unik
            const safePesan = pesan.replace(/"/g, '&quot;');
            const messageId = Date.now();

            // 1. UI User (Aksi Edit & Salin disembunyikan sementara dengan class 'hidden')
            chatBox.innerHTML += `
                <div class="flex w-full justify-end mb-2" data-text="${safePesan}">
                    <div class="flex gap-3 max-w-[90%] sm:max-w-[80%] flex-row-reverse">
                        <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center shrink-0 mt-1 shadow-md"><i class="ph ph-user text-white"></i></div>
                        <div class="flex flex-col items-end group">
                            <div class="bg-userbg text-white p-3 sm:p-4 rounded-2xl rounded-tr-sm shadow-md leading-relaxed break-words relative">${userHtml}</div>
                            <div id="user-actions-${messageId}" class="flex items-center gap-3 mt-1 opacity-0 group-hover:opacity-100 transition-opacity hidden">
                                <button onclick="copyTeks(this)" class="text-slate-400 hover:text-green-400 text-xs flex items-center gap-1"><i class="ph ph-copy"></i> Salin</button>
                                <button onclick="editTeks(this)" class="text-slate-400 hover:text-blue-400 text-xs flex items-center gap-1"><i class="ph ph-pencil"></i> Edit</button>
                                <span class="text-[10px] text-slate-500">${timeNow}</span>
                            </div>
                        </div>
                    </div>
                </div>`;

            inputField.value = ""; inputField.style.height = ''; chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });

            const selectedModel = document.getElementById('model-selector').value;
            let finalPrompt = pesan;
            if (attachedDocumentText) finalPrompt = `Berikut isi file '${attachedFileName}':\n\n${attachedDocumentText}\n\nTugas: ${pesan}`;

            logConsole(`Mengirim POST request ke ${selectedModel}...`);

            const tempBase64 = attachedImageBase64;
            const tempMime = attachedMimeType;
            resetAttachment();

            // 2. UI Animasi Loading AI (Waktu & Tombol Salin disembunyikan sementara)
            const loadingId = "loading-" + messageId;
            chatBox.innerHTML += `
                <div class="flex w-full justify-start mb-2" id="wrapper-${loadingId}">
                    <div class="flex gap-3 max-w-[90%] sm:max-w-[80%]">
                        <div class="w-8 h-8 rounded-full bg-blue-500/20 flex items-center justify-center shrink-0 mt-1"><i class="ph ph-robot text-blue-400"></i></div>
                        <div class="flex flex-col items-start group">
                            <div class="bg-aibg text-textmain px-5 py-4 rounded-2xl rounded-tl-sm shadow-sm" id="${loadingId}">
                                <div class="modern-loader"><div class="orb"></div><span class="text-sm font-semibold text-blue-300 ml-2 tracking-wide">Menganalisis...</span></div>
                            </div>
                            <div class="flex items-center gap-3 mt-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                <span class="text-[10px] text-slate-500 hidden" id="time-${loadingId}">${timeNow}</span>
                                <button onclick="copyTeks(this)" class="text-slate-400 hover:text-green-400 text-xs flex items-center gap-1 hidden" id="copy-${loadingId}"><i class="ph ph-copy"></i> Salin</button>
                            </div>
                        </div>
                    </div>
                </div>`;
            chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });

            // 3. Eksekusi API
            const startTime = performance.now();
            try {
                let responseDataHTML = "";

                if (selectedModel.startsWith('gemini')) {
                    const apiKey = document.getElementById("api-key").value.trim();
                    if (!apiKey) throw new Error("API Key Gemini belum diisi!");

                    let parts = [{ "text": finalPrompt }];
                    if (tempBase64) {
                        parts.push({ "inline_data": { "mime_type": tempMime || "image/jpeg", "data": tempBase64 } });
                    }

                    const geminiUrl = `https://generativelanguage.googleapis.com/v1beta/models/${selectedModel}:generateContent?key=${apiKey}`;
                    const res = await fetch(geminiUrl, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ contents: [{ parts: parts }] })
                    });

                    if (!res.ok) throw new Error(`Gemini API Error: ${res.status}`);
                    const data = await res.json();
                    responseDataHTML = formatMarkdown(data.candidates[0].content.parts[0].text);

                } else {
                    const baseUrl = document.getElementById("api-url").value.trim();
                    let requestBody = { model: selectedModel, prompt: finalPrompt, stream: false };
                    if (tempBase64 && selectedModel === 'llama3.2-vision') requestBody.images = [tempBase64];

                    const res = await fetch(`${baseUrl}/api/generate`, {
                        method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(requestBody),
                    });

                    if (!res.ok) throw new Error(`Ollama API Error: ${res.status}`);
                    const data = await res.json();
                    responseDataHTML = formatMarkdown(data.response);
                }

                const endTime = performance.now();
                logConsole(`Berhasil! Waktu respon: ${((endTime - startTime) / 1000).toFixed(2)} detik.`);

                // Render Jawaban AI
                document.getElementById(loadingId).innerHTML = responseDataHTML;

                // === FITUR BARU: Buka fitur edit/salin/waktu HANYA setelah sukses ===
                document.getElementById(`user-actions-${messageId}`).classList.remove('hidden');
                document.getElementById(`copy-${loadingId}`).classList.remove('hidden');
                document.getElementById(`time-${loadingId}`).classList.remove('hidden');

                chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });

            } catch (error) {
                logConsole(`Gagal: ${error.message}`, true);
                document.getElementById(loadingId).innerHTML = `<div class="flex items-center gap-2 text-red-400"><i class="ph ph-warning-circle text-xl"></i><span>Pesan Error: ${error.message}</span></div>`;
            }
        }

        function handleEnter(event) { if (event.key === "Enter" && !event.shiftKey) { event.preventDefault(); kirimPesan(); } }
        function resetAttachment() { attachedImageBase64 = null; attachedDocumentText = ""; attachedFileName = ""; attachedMimeType = ""; document.getElementById("fileInput").value = ""; document.getElementById("file-preview").style.display = "none"; }
        function clearChat() { if (confirm("Hapus semua riwayat obrolan?")) { document.getElementById("chat-box").innerHTML = `<div class="flex w-full justify-start"><div class="flex gap-3 max-w-[90%] sm:max-w-[80%]"><div class="w-8 h-8 rounded-full bg-blue-500/20 flex items-center justify-center shrink-0 mt-1"><i class="ph ph-robot text-blue-400"></i></div><div class="bg-aibg text-textmain p-3 sm:p-4 rounded-2xl rounded-tl-sm shadow-sm leading-relaxed">Obrolan bersih. Ada yang lain?</div></div></div>`; logConsole("Chat dibersihkan."); } }
        /* --- FITUR EDIT & SALIN --- */
        function copyTeks(btn) {
            const container = btn.closest('.flex-col');
            const dataText = btn.closest('[data-text]');
            let textToCopy = "";

            if (dataText) {
                textToCopy = dataText.dataset.text; // Salin prompt original user
            } else {
                const contentDiv = container.querySelector('.bg-aibg');
                textToCopy = contentDiv.innerText; // Salin teks balasan AI
            }

            navigator.clipboard.writeText(textToCopy);
            showToast('Teks berhasil disalin!', 'success');
        }

        function editTeks(btn) {
            const dataText = btn.closest('[data-text]');
            if (dataText) {
                document.getElementById('userInput').value = dataText.dataset.text;
                document.getElementById('userInput').focus();
                showToast('Pesan siap diedit.', 'success');
            }
        }
    </script>
</body>

</html>
